<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 16px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    .carrier {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .carrier-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    .price {
      text-align: right;
    }
    .monthly {
      font-size: 20px;
      font-weight: bold;
      color: #2563eb;
    }
    .annual {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Your Insurance Quote</div>
    <div class="subtitle" id="subtitle">Loading...</div>
    <div id="carriers"></div>
  </div>

  <script>
    console.log("🟢 Insurance widget loaded");
    
    function render(data) {
      console.log("📦 Rendering with data:", data);

      const subtitle = document.getElementById('subtitle');
      const carriersDiv = document.getElementById('carriers');

      // Build subtitle with whatever info we have
      const parts = [];

      // Add location
      if (data.city) {
        parts.push(data.city);
      } else if (data.zip_code) {
        parts.push(`ZIP ${data.zip_code}`);
      }

      // Add vehicle info if available
      if (data.vehicle && (data.vehicle.year || data.vehicle.make || data.vehicle.model)) {
        const vehicleParts = [];
        if (data.vehicle.year) vehicleParts.push(data.vehicle.year);
        if (data.vehicle.make) vehicleParts.push(data.vehicle.make);
        if (data.vehicle.model) vehicleParts.push(data.vehicle.model);
        parts.push(vehicleParts.join(' '));
      } else {
        // Just show vehicle count if no details
        const numVehicles = data.num_vehicles || 1;
        const vehicleText = numVehicles === 1 ? '1 vehicle' : `${numVehicles} vehicles`;
        parts.push(vehicleText);
      }

      // Add coverage type if available
      if (data.coverage_type) {
        parts.push(data.coverage_type);
      }

      // Add driver info if available
      if (data.driver_age) {
        const driverParts = [`Age ${data.driver_age}`];
        if (data.marital_status) {
          driverParts.push(data.marital_status);
        }
        parts.push(driverParts.join(', '));
      } else {
        // Just show driver count if no details
        const numDrivers = data.num_drivers || 1;
        const driverText = numDrivers === 1 ? '1 driver' : `${numDrivers} drivers`;
        parts.push(driverText);
      }

      subtitle.textContent = parts.join(' • ');

      // Render carriers
      const carriers = data.carriers || [];
      carriersDiv.innerHTML = '';

      carriers.forEach(carrier => {
        const div = document.createElement('div');
        div.className = 'carrier';
        div.innerHTML = `
          <div class="carrier-name">${carrier.name}</div>
          <div class="price">
            <div class="monthly">$${carrier.monthly_cost}/mo</div>
            <div class="annual">$${carrier.annual_cost}/year</div>
          </div>
        `;
        carriersDiv.appendChild(div);
      });
    }
    
    // Check for existing data
    if (window.openai && window.openai.toolOutput) {
      console.log("✅ Found window.openai.toolOutput");
      render(window.openai.toolOutput);
    }
    
    // Listen for hydration event
    window.addEventListener('openai:set_globals', (event) => {
      console.log("🎯 Received openai:set_globals", event.detail);
      if (event.detail && event.detail.globals && event.detail.globals.toolOutput) {
        render(event.detail.globals.toolOutput);
      }
    });
  </script>
</body>
</html>
